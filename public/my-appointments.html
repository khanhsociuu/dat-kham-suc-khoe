<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch hẹn của tôi — SứcKhỏeOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-header"></div>
<section class="section-tight">
  <div class="container">
    <span class="eyebrow">Tài khoản của tôi</span>
    <h1>Lịch hẹn của tôi</h1>
    <div id="content"><div class="spinner"></div></div>
  </div>
</section>

<!-- Modal đánh giá -->
<div class="modal-overlay" id="review-modal">
  <div class="modal" style="max-width:440px">
    <button class="modal-close" onclick="document.getElementById('review-modal').classList.remove('open')">×</button>
    <h3>⭐ Đánh giá sau khám</h3>
    <p id="review-appt-label" class="muted"></p>
    <form id="review-form">
      <div class="form-group">
        <label>Điểm đánh giá</label>
        <div class="flex gap-8" id="star-picker">
          <button type="button" class="star-btn btn btn-ghost" data-v="1">⭐ 1</button>
          <button type="button" class="star-btn btn btn-ghost" data-v="2">⭐⭐ 2</button>
          <button type="button" class="star-btn btn btn-ghost" data-v="3">⭐⭐⭐ 3</button>
          <button type="button" class="star-btn btn btn-ghost" data-v="4">⭐⭐⭐⭐ 4</button>
          <button type="button" class="star-btn btn btn-ghost" data-v="5">⭐⭐⭐⭐⭐ 5</button>
        </div>
        <input type="hidden" id="review-rating" value="">
      </div>
      <div class="form-group"><label>Nhận xét (không bắt buộc)</label><textarea id="review-comment" placeholder="Bác sĩ khám kỹ, phòng khám sạch sẽ..."></textarea></div>
      <div id="review-msg"></div>
      <button class="btn btn-primary btn-block" type="submit">Gửi đánh giá</button>
    </form>
  </div>
</div>

<div id="app-footer"></div>
<div id="chatbot-widget"></div>
<script src="/js/common.js"></script>
<script>
let currentReviewApptId = null;
const STATUS_LABEL = {
  confirmed: '🕐 Chờ đến khám',
  attended:  '✅ Đã đến khám',
  cancelled: '❌ Đã huỷ'
};
const STATUS_COLOR = {
  confirmed: 'var(--teal-700)',
  attended:  'var(--success)',
  cancelled: 'var(--danger)'
};

async function load() {
  const { user } = await apiFetch('/auth/me');
  if (!user) { location.href = '/login.html'; return; }
  const appts = await apiFetch('/appointments/mine');
  const content = document.getElementById('content');
  if (!appts.length) {
    content.innerHTML = `<div class="empty-state"><div class="icon">📅</div>Bạn chưa có lịch hẹn nào.<br><a href="/booking.html" class="btn btn-primary mt-16">Đặt lịch ngay</a></div>`;
    return;
  }
  content.innerHTML = `<div class="grid grid-2">${appts.map(a => `
    <div class="card card-body">
      <div class="flex-between">
        <span style="font-weight:700;color:${STATUS_COLOR[a.status]||'var(--ink-700)'}">${STATUS_LABEL[a.status]||a.status}</span>
        <span class="muted" style="font-size:13px">#${a.id}</span>
      </div>
      <h4 class="mt-8">${a.doctor?.full_name||''} <span style="font-size:13px;color:var(--ink-500)">(${a.doctor?.degree||''})</span></h4>
      <p style="font-size:14px;margin:6px 0">
        🏥 ${a.clinic?.name||''}<br>
        🗺️ ${a.clinic?.address||''}, ${a.clinic?.district||''}<br>
        ☎️ ${a.clinic?.phone||''}<br>
        📅 <b>${a.appointment_date}</b> lúc <b>${a.appointment_time}</b>
      </p>
      ${a.symptom?`<p style="font-size:13px" class="muted">Triệu chứng: ${a.symptom}</p>`:''}
      <div class="flex gap-8 mt-8" style="flex-wrap:wrap">
        ${a.status==='confirmed'?`<button class="btn btn-outline btn-sm cancel-btn" data-id="${a.id}">Huỷ lịch</button>`:''}
        ${a.status==='attended'&&!a.review?`<button class="btn btn-primary btn-sm" onclick="openReview(${a.id},'${a.doctor?.full_name||''}')">⭐ Đánh giá</button>`:''}
        ${a.review?`<span class="badge" style="background:#dcfce7;color:#16a34a">Đã đánh giá ${'⭐'.repeat(a.review.rating)}</span>`:''}
      </div>
    </div>`).join('')}</div>`;

  content.querySelectorAll('.cancel-btn').forEach(b => b.addEventListener('click', async () => {
    if (!confirm('Bạn chắc chắn muốn huỷ?')) return;
    await apiFetch('/appointments/' + b.dataset.id, { method: 'DELETE' });
    load();
  }));
}

function openReview(id, doctorName) {
  currentReviewApptId = id;
  document.getElementById('review-appt-label').textContent = 'Bác sĩ: ' + doctorName;
  document.getElementById('review-rating').value = '';
  document.getElementById('review-comment').value = '';
  document.getElementById('review-msg').innerHTML = '';
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('btn-primary'));
  document.getElementById('review-modal').classList.add('open');
}

document.querySelectorAll('.star-btn').forEach(b => b.addEventListener('click', () => {
  document.getElementById('review-rating').value = b.dataset.v;
  document.querySelectorAll('.star-btn').forEach(x => x.classList.remove('btn-primary'));
  b.classList.add('btn-primary');
}));

document.getElementById('review-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const rating = document.getElementById('review-rating').value;
  const msg = document.getElementById('review-msg');
  if (!rating) { msg.innerHTML = '<div class="alert alert-error">Vui lòng chọn số sao.</div>'; return; }
  try {
    const r = await apiFetch('/appointments/' + currentReviewApptId + '/review', {
      method: 'POST', body: JSON.stringify({ rating: Number(rating), comment: document.getElementById('review-comment').value })
    });
    msg.innerHTML = `<div class="alert alert-success">${r.message}</div>`;
    setTimeout(() => { document.getElementById('review-modal').classList.remove('open'); load(); }, 1200);
  } catch(err) { msg.innerHTML = `<div class="alert alert-error">${err.error||'Lỗi gửi đánh giá'}</div>`; }
});

load();
</script>
</body>
</html>
