<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập — SứcKhỏeOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-header"></div>

<div class="card auth-card">
  <h2>Đăng nhập</h2>
  <p class="muted">Đăng nhập để quản lý lịch hẹn của bạn.</p>
  <div id="msg"></div>
  <form id="login-form">
    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="password" required></div>
    <button class="btn btn-primary btn-block" type="submit">Đăng nhập</button>
  </form>
  <p class="mt-16 center muted">Chưa có tài khoản? <a href="/register.html">Đăng ký ngay</a></p>
  <p class="center muted" style="font-size:12.5px">Tài khoản admin demo: admin@suckhoe.vn / admin123</p>
</div>

<div id="app-footer"></div>
<div id="chatbot-widget"></div>
<script src="/js/common.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  try {
    const r = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({
      email: document.getElementById('email').value, password: document.getElementById('password').value
    })});
    location.href = r.user.role === 'admin' ? '/admin.html' : '/my-appointments.html';
  } catch (err) {
    msg.innerHTML = `<div class="alert alert-error">${err.error || 'Đăng nhập thất bại'}</div>`;
  }
});
</script>
</body>
</html>
