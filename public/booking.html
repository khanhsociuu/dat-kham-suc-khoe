<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đặt lịch khám — SứcKhỏeOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-header"></div>

<section class="section-tight">
  <div class="container" style="max-width:860px">
    <span class="eyebrow">Đặt lịch khám</span>
    <h1>Đặt lịch khám sức khỏe</h1>

    <div class="steps">
      <div class="step-pill active" data-step="1"><span class="step-num">1</span> Phòng khám</div>
      <div class="step-pill" data-step="2"><span class="step-num">2</span> Chuyên khoa</div>
      <div class="step-pill" data-step="3"><span class="step-num">3</span> Bác sĩ &amp; giờ khám</div>
      <div class="step-pill" data-step="4"><span class="step-num">4</span> Xác nhận</div>
    </div>

    <div id="booking-app"><div class="spinner"></div></div>
  </div>
</section>

<div id="app-footer"></div>
<div id="chatbot-widget"></div>
<script src="/js/common.js"></script>
<script src="/js/booking.js"></script>
</body>
</html>
