<script src="/js/common.js"></script>
<script>
async function loadFacilities() {
  try {
    const facilities = await apiFetch('/facilities');
    document.getElementById('loading').style.display = 'none';

    if (!facilities.length) {
      document.getElementById('empty-state').style.display = 'block';
      return;
    }

    document.getElementById('facility-list').innerHTML = facilities.map(f => `
      <div class="card">
        <img class="card-img"
             style="height:200px;object-fit:cover"
             src="${f.image || 'https://picsum.photos/seed/' + f.id + '/600/360'}"
             alt="${f.title}"
             onerror="this.src='https://picsum.photos/seed/default/600/360'">
        <div class="card-body">
          <div class="flex gap-12" style="align-items:center">
            <div class="icon-circle">${f.icon || '🏥'}</div>
            <h4 class="mb-0">${f.title}</h4>
          </div>
          <p class="mt-16" style="font-size:14.5px;line-height:1.7">${f.description}</p>
        </div>
      </div>`).join('');
  } catch (e) {
    document.getElementById('loading').innerHTML = '<p class="muted">Không tải được dữ liệu. Vui lòng thử lại.</p>';
  }
}

loadFacilities();
</script>
