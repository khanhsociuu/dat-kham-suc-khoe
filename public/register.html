<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng ký — SứcKhỏeOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-header"></div>

<div class="card auth-card">
  <h2>Tạo tài khoản</h2>
  <p class="muted">Tạo tài khoản để theo dõi lịch hẹn và nhận nhắc lịch nhanh hơn.</p>
  <div id="msg"></div>
  <form id="register-form">
    <div class="form-group"><label>Họ và tên</label><input type="text" id="full_name" required></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Số điện thoại</label><input type="tel" id="phone"></div>
    <div class="form-group"><label>Địa chỉ</label><input type="text" id="address" placeholder="VD: Cầu Giấy, Hà Nội"></div>
    <div class="form-group"><label>Mật khẩu</label><input type="password" id="password" minlength="6" required></div>
    <button class="btn btn-primary btn-block" type="submit">Đăng ký</button>
  </form>
  <p class="mt-16 center muted">Đã có tài khoản? <a href="/login.html">Đăng nhập</a></p>
</div>

<div id="app-footer"></div>
<div id="chatbot-widget"></div>
<script src="/js/common.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  try {
    await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify({
      full_name: document.getElementById('full_name').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      password: document.getElementById('password').value
    })});
    location.href = '/my-appointments.html';
  } catch (err) {
    msg.innerHTML = `<div class="alert alert-error">${err.error || 'Đăng ký thất bại'}</div>`;
  }
});
</script>
</body>
</html>
