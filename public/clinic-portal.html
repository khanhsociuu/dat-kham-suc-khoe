<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cổng nhân viên phòng khám — SứcKhỏeOnline</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app-header"></div>
<section class="section-tight">
  <div class="container">
    <span class="eyebrow">Cổng nhân viên</span>
    <h1 id="portal-title">Xác nhận lịch khám</h1>
    <div id="guard-msg"></div>

    <!-- Stats hôm nay -->
    <div class="grid grid-4 mt-16" id="stats-row"></div>

    <!-- Bộ lọc ngày -->
    <div class="card card-body mt-24" style="max-width:360px">
      <div class="form-group mb-0">
        <label>📅 Xem lịch ngày</label>
        <input type="date" id="date-filter">
      </div>
    </div>

    <!-- Danh sách lịch hẹn -->
    <div class="table-wrap mt-16">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Giờ</th><th>Bệnh nhân</th><th>SĐT</th><th>Bác sĩ</th><th>Triệu chứng</th><th>Trạng thái</th><th>Hoa hồng</th><th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="appt-body"><tr><td colspan="9" class="center muted">Đang tải...</td></tr></tbody>
      </table>
    </div>
  </div>
</section>

<!-- Modal xác nhận -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:420px">
    <button class="modal-close" id="modal-close-btn">×</button>
    <h3>Xác nhận bệnh nhân đã đến khám</h3>
    <div id="confirm-appt-info" class="alert alert-info" style="margin-bottom:16px"></div>
    <form id="confirm-form">
      <div class="form-group">
        <label>💰 Số tiền bệnh nhân đã thanh toán (VNĐ)</label>
        <input type="number" id="amount-input" placeholder="VD: 200000" min="0" required>
        <p class="field-hint">Hệ thống sẽ tự tính hoa hồng dựa theo tỷ lệ trong hợp đồng.</p>
      </div>
      <div class="form-group">
        <label>Ghi chú (không bắt buộc)</label>
        <textarea id="note-input" placeholder="VD: Bệnh nhân làm thêm xét nghiệm, tổng 350.000đ"></textarea>
      </div>
      <div id="confirm-result"></div>
      <button class="btn btn-primary btn-block" type="submit">✅ Xác nhận đã đến khám</button>
    </form>
  </div>
</div>

<div id="app-footer"></div>
<script src="/js/common.js"></script>
<script>
let currentApptId = null;

const STATUS_MAP = {
  confirmed: '<span class="badge">Chờ đến</span>',
  attended:  '<span class="badge" style="background:#dcfce7;color:#16a34a">✅ Đã đến</span>',
  cancelled: '<span class="badge badge-coral">❌ Huỷ</span>'
};

async function loadSummary() {
  try {
    const s = await apiFetch('/clinic-portal/summary');
    document.getElementById('stats-row').innerHTML = `
      <div class="card card-body center"><b style="font-size:28px;color:var(--teal-700)">${s.today_appointments}</b><div class="muted">Lịch hẹn hôm nay</div></div>
      <div class="card card-body center"><b style="font-size:28px;color:var(--success)">${s.today_attended}</b><div class="muted">Đã đến khám hôm nay</div></div>
      <div class="card card-body center"><b style="font-size:28px;color:var(--teal-700)">${s.month_attended}</b><div class="muted">Lượt khám tháng này</div></div>
      <div class="card card-body center"><b style="font-size:28px;color:var(--coral-500)">${Number(s.month_commission).toLocaleString('vi-VN')}đ</b><div class="muted">Hoa hồng tháng này</div></div>`;
  } catch(e) {}
}

async function loadAppointments() {
  const date = document.getElementById('date-filter').value;
  const body = document.getElementById('appt-body');
  body.innerHTML = '<tr><td colspan="9" class="center"><div class="spinner" style="margin:0 auto"></div></td></tr>';
  try {
    const { appointments } = await apiFetch('/clinic-portal/appointments?date=' + date);
    if (!appointments.length) {
      body.innerHTML = `<tr><td colspan="9" class="empty-state" style="text-align:center;padding:40px">Không có lịch hẹn nào ngày ${date}</td></tr>`;
      return;
    }
    body.innerHTML = appointments.map(a => `
      <tr>
        <td><b>#${a.id}</b></td>
        <td><b>${a.appointment_time}</b></td>
        <td>${a.patient_name}<br><small class="muted">${a.patient_email}</small></td>
        <td>${a.patient_phone || '—'}</td>
        <td>${a.doctor_name || '—'}</td>
        <td style="max-width:140px;font-size:13px">${a.symptom || '—'}</td>
        <td>${STATUS_MAP[a.status] || a.status}</td>
        <td style="font-size:13px;color:var(--coral-600)">
          ${a.commission ? `<b>${Number(a.commission.commission_amount).toLocaleString('vi-VN')}đ</b><br><small>(${(a.commission.commission_rate*100).toFixed(0)}%)</small>` : '—'}
        </td>
        <td>
          ${a.status === 'confirmed' ? `<button class="btn btn-primary btn-sm" onclick="openConfirm(${a.id},'${a.patient_name}','${a.appointment_time}')">Xác nhận đến</button>` : ''}
          ${a.status === 'attended' ? '<span class="muted" style="font-size:13px">Đã xác nhận</span>' : ''}
        </td>
      </tr>`).join('');
  } catch(e) {
    body.innerHTML = '<tr><td colspan="9" class="muted center">Lỗi tải dữ liệu.</td></tr>';
  }
}

function openConfirm(id, name, time) {
  currentApptId = id;
  document.getElementById('confirm-appt-info').innerHTML = `Bệnh nhân: <b>${name}</b> — Giờ: <b>${time}</b> — Mã #${id}`;
  document.getElementById('confirm-result').innerHTML = '';
  document.getElementById('amount-input').value = '';
  document.getElementById('note-input').value = '';
  document.getElementById('confirm-modal').classList.add('open');
}

document.getElementById('confirm-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const resultBox = document.getElementById('confirm-result');
  try {
    const r = await apiFetch('/clinic-portal/appointments/' + currentApptId + '/confirm', {
      method: 'POST',
      body: JSON.stringify({ amount_clinic: Number(document.getElementById('amount-input').value), note: document.getElementById('note-input').value })
    });
    resultBox.innerHTML = `<div class="alert alert-success">✅ ${r.message}</div>`;
    setTimeout(() => {
      document.getElementById('confirm-modal').classList.remove('open');
      loadAppointments(); loadSummary();
    }, 1800);
  } catch(err) {
    resultBox.innerHTML = `<div class="alert alert-error">${err.error || 'Lỗi xác nhận'}</div>`;
  }
});

document.getElementById('modal-close-btn').addEventListener('click', () => document.getElementById('confirm-modal').classList.remove('open'));
document.getElementById('date-filter').addEventListener('change', loadAppointments);

async function init() {
  const { user } = await apiFetch('/auth/me');
  if (!user || (user.role !== 'clinic_staff' && user.role !== 'admin')) {
    document.getElementById('guard-msg').innerHTML = `<div class="alert alert-error">Bạn cần đăng nhập bằng tài khoản nhân viên phòng khám.<br><a href="/login.html" class="btn btn-primary btn-sm mt-8">Đăng nhập</a></div>`;
    return;
  }
  document.getElementById('date-filter').value = new Date().toISOString().slice(0, 10);
  loadSummary();
  loadAppointments();
}
init();
</script>
</body>
</html>
